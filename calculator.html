<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">계산기</h1>

        <!-- 디스플레이 -->
        <div class="bg-gray-900 rounded-lg p-6 mb-6">
            <input
                type="text"
                id="display"
                class="w-full text-right text-4xl font-bold text-white bg-transparent outline-none"
                value="0"
                readonly
            >
        </div>

        <!-- 버튼 그리드 -->
        <div class="grid grid-cols-4 gap-4">
            <!-- 리셋 버튼 -->
            <button
                onclick="calculator.clear()"
                class="col-span-2 bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                C
            </button>

            <!-- 연산자 버튼 -->
            <button
                onclick="calculator.appendOperator('/')"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                ÷
            </button>
            <button
                onclick="calculator.appendOperator('*')"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                ×
            </button>

            <!-- 숫자 버튼 7, 8, 9 -->
            <button
                onclick="calculator.appendNumber('7')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                7
            </button>
            <button
                onclick="calculator.appendNumber('8')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                8
            </button>
            <button
                onclick="calculator.appendNumber('9')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                9
            </button>
            <button
                onclick="calculator.appendOperator('-')"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                −
            </button>

            <!-- 숫자 버튼 4, 5, 6 -->
            <button
                onclick="calculator.appendNumber('4')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                4
            </button>
            <button
                onclick="calculator.appendNumber('5')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                5
            </button>
            <button
                onclick="calculator.appendNumber('6')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                6
            </button>
            <button
                onclick="calculator.appendOperator('+')"
                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                +
            </button>

            <!-- 숫자 버튼 1, 2, 3 -->
            <button
                onclick="calculator.appendNumber('1')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                1
            </button>
            <button
                onclick="calculator.appendNumber('2')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                2
            </button>
            <button
                onclick="calculator.appendNumber('3')"
                class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                3
            </button>
            <button
                onclick="calculator.appendOperator('.')"
                class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                .
            </button>

            <!-- 0 버튼과 등호 버튼 -->
            <button
                onclick="calculator.appendNumber('0')"
                class="col-span-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                0
            </button>
            <button
                onclick="calculator.calculate()"
                class="col-span-2 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-lg text-lg transition active:scale-95"
            >
                =
            </button>
        </div>
    </div>

    <script>
        // 계산기 객체
        const calculator = {
            // 현재 표시할 값
            display: '0',
            // 이전 값
            previousValue: null,
            // 현재 연산자
            operator: null,
            // 새로운 숫자 입력 시작 여부
            shouldResetDisplay: false,

            // 숫자 추가
            appendNumber(num) {
                // 새로운 숫자 입력 시작하면 디스플레이 초기화
                if (this.shouldResetDisplay) {
                    this.display = num;
                    this.shouldResetDisplay = false;
                } else {
                    // 0 다음에 다른 숫자가 오면 0 제거
                    if (this.display === '0' && num !== '.') {
                        this.display = num;
                    } else if (num === '.' && this.display.includes('.')) {
                        // 소수점이 이미 있으면 추가하지 않음
                        return;
                    } else {
                        this.display += num;
                    }
                }
                this.updateDisplay();
            },

            // 연산자 추가
            appendOperator(op) {
                // 이전 연산이 있으면 먼저 계산
                if (this.previousValue !== null && this.operator && !this.shouldResetDisplay) {
                    this.calculate();
                }

                this.previousValue = parseFloat(this.display);
                this.operator = op;
                this.shouldResetDisplay = true;
            },

            // 계산 수행
            calculate() {
                if (this.previousValue === null || this.operator === null) {
                    return;
                }

                const current = parseFloat(this.display);
                let result;

                switch (this.operator) {
                    case '+':
                        result = this.previousValue + current;
                        break;
                    case '-':
                        result = this.previousValue - current;
                        break;
                    case '*':
                        result = this.previousValue * current;
                        break;
                    case '/':
                        result = current !== 0 ? this.previousValue / current : 0;
                        break;
                    case '.':
                        return;
                    default:
                        return;
                }

                // 결과를 정수나 소수로 표시
                this.display = result % 1 === 0 ? result.toString() : result.toFixed(10).replace(/\.?0+$/, '');
                this.previousValue = null;
                this.operator = null;
                this.shouldResetDisplay = true;
                this.updateDisplay();
            },

            // 디스플레이 초기화
            clear() {
                this.display = '0';
                this.previousValue = null;
                this.operator = null;
                this.shouldResetDisplay = false;
                this.updateDisplay();
            },

            // 디스플레이 업데이트
            updateDisplay() {
                document.getElementById('display').value = this.display;
            }
        };
    </script>
</body>
</html>
